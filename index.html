<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PM Tool</title>

<style>
body{
font-family:-apple-system,system-ui,Arial;
margin:20px;
}

.card{
max-width:750px;
margin:auto;
}

label{
font-weight:600;
display:block;
margin-top:14px;
}

input,textarea{
width:100%;
padding:10px;
font-size:16px;
margin-top:6px;
box-sizing:border-box;
}

textarea{
min-height:90px;
}

button{
padding:12px;
margin-top:14px;
font-size:16px;
width:100%;
}

.inline{
display:flex;
gap:10px;
}

.inline button{
width:auto;
}

pre{
background:#f5f5f5;
padding:14px;
white-space:pre-wrap;
border-radius:8px;
}
</style>
</head>

<body>

<div class="card">

<h2>PM Tool</h2>

<label>Location</label>
<input id="location">

<label>Date</label>
<input id="date">

<label>Equipment on Site</label>
<textarea id="equipment"></textarea>

<label>Notes / Repairs</label>
<textarea id="notes"></textarea>

<label>Parts used</label>
<input id="used">

<label>Cost of parts</label>
<input id="cost">

<label>Parts needed next PM</label>

<div class="inline">
<input id="next">
<button id="same">Same</button>
</div>

<label>Work done</label>
<input id="workdone">

<button id="generate">Generate PM Report</button>
<button id="copy">Copy Report</button>

<label>Output</label>
<pre id="output"></pre>

</div>

<script>

function today(){
const d=new Date()
return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")
}

document.getElementById("date").value=today()

document.getElementById("workdone").value="Changed filters/belts and verified operations of equipment"


/* ---------- number conversion ---------- */

const numMap={
one:"1",two:"2",three:"3",four:"4",five:"5",
six:"6",seven:"7",eight:"8",nine:"9",ten:"10",
ones:"1",twos:"2",threes:"3"
}

function convertNumbers(text){

let t=text

for(let k in numMap){
let r=new RegExp("\\b"+k+"\\b","gi")
t=t.replace(r,numMap[k])
}

return t
}


/* ---------- equipment parsing ---------- */

function expandEquipmentCounts(text){

let t=text.toLowerCase()

t=t.replace(/\n/g," ")

t=t.replace(/\s+and\s+/g,",")

t=convertNumbers(t)

t=t.replace(/\brt\b/g,"rtu")

t=t.replace(/rt\s*you/g,"rtu")
t=t.replace(/rt\s*u/g,"rtu")

const map=[
["rooftop units","rtu"],
["rooftop unit","rtu"],
["furnaces","f"],
["furnace","f"],
["radiant heaters","rh"],
["radiant heater","rh"],
["unit heaters","uh"],
["unit heater","uh"],
["exhaust fans","ef"],
["exhaust fan","ef"],
["make up air","mua"]
]

for(const m of map){
let r=new RegExp(m[0],"g")
t=t.replace(r,m[1])
}

let parts=t.split(",")

let out=[]

for(let p of parts){

p=p.trim()

let m=p.match(/(\d+)\s*(rtu|rh|uh|f|ef|mua)/)

if(m){

let count=parseInt(m[1])
let code=m[2].toUpperCase()

for(let i=1;i<=count;i++){
out.push(code+i)
}

}
}

return out.join(",")
}


/* ---------- expand equipment labels ---------- */

const equipLabels={
RTU:"Rooftop Unit",
RH:"Radiant Heater",
UH:"Unit Heater",
F:"Furnace",
EF:"Exhaust Fan",
MUA:"Make-Up Air Unit"
}

function expandEquipment(text){

let list=text.split(",")

let out=[]

for(let e of list){

let m=e.match(/([A-Z]+)(\d+)/)

if(!m)continue

let code=m[1]
let num=m[2]

let label=equipLabels[code]||code

out.push(code+num+" ("+label+")")
}

return out.join("\n")
}


/* ---------- parts parsing ---------- */

function normalizeParts(text){

let t=text.toLowerCase()

t=t.replace(/\s+and\s+/g,",")

t=convertNumbers(t)

t=t.replace(/by/g,"x")

t=t.replace(/(\d+)\s+(\d+)\s*x\s*(\d+)/g,"$1x$2x$3")

t=t.replace(/(\d+)\s*x\s*(\d+)\s*x\s*(\d+)/g,"$1x$2x$3")

let items=t.split(",")

let out=[]

for(let i of items){

i=i.trim()

let m=i.match(/(\d+)\s*(\d+x\d+x\d+)/)

if(m){

out.push(m[1]+" – "+m[2])

}

}

return out.join(", ")
}


/* ---------- same button ---------- */

document.getElementById("same").onclick=function(){

document.getElementById("next").value=document.getElementById("used").value

}


/* ---------- generate report ---------- */

document.getElementById("generate").onclick=function(){

let location=document.getElementById("location").value||"[Location]"

let date=document.getElementById("date").value

let equipRaw=document.getElementById("equipment").value

let equipCodes=expandEquipmentCounts(equipRaw)

let equip=expandEquipment(equipCodes)

let notes=document.getElementById("notes").value.trim()

if(!notes)notes="All units are running good at this time."

let usedRaw=document.getElementById("used").value
let used=usedRaw?normalizeParts(usedRaw):"None"

let nextRaw=document.getElementById("next").value
let next=nextRaw?normalizeParts(nextRaw):"None"

let cost=document.getElementById("cost").value||"Unknown"

let workdone=document.getElementById("workdone").value

let report=`PM

Location:
${location}

Date:
${date}

Equipment on Site:
${equip}

Notes / Repairs:
${notes}

Work done:
${workdone}

Parts used:
${used}

Cost of parts (if known):
${cost}

Parts needed for next PM:
${next}

Pictures:
Nameplate photos attached.
`

document.getElementById("output").textContent=report

}


/* ---------- copy ---------- */

document.getElementById("copy").onclick=function(){

navigator.clipboard.writeText(document.getElementById("output").textContent)

}

</script>

</body>
</html>
