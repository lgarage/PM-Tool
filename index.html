<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HVAC Note Tool</title>

<style>
body{
  font-family:-apple-system,system-ui,Arial;
  margin:20px;
  background:#fff;
  color:#111;
}
.card{
  max-width:820px;
  margin:auto;
}
label{
  font-weight:600;
  display:block;
  margin-top:14px;
}
input,textarea{
  width:100%;
  padding:10px;
  font-size:16px;
  margin-top:6px;
  box-sizing:border-box;
  border:1px solid #ccc;
  border-radius:8px;
}
textarea{
  min-height:90px;
  white-space:pre-wrap;
  overflow-wrap:break-word;
  resize:vertical;
}
button{
  padding:12px;
  margin-top:14px;
  font-size:16px;
  width:100%;
  border:1px solid #ccc;
  border-radius:8px;
  background:#f7f7f7;
}
button:active{
  transform:scale(.99);
}
.inline{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:flex-start;
}
.inline .grow{
  flex:1 1 320px;
}
.inline button{
  width:auto;
}
pre{
  background:#f5f5f5;
  padding:14px;
  white-space:pre-wrap;
  border-radius:8px;
  border:1px solid #ddd;
}
.small{
  font-size:13px;
  opacity:.75;
  margin-top:6px;
}
.pillbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}
.pillbar button{
  width:auto;
  margin-top:0;
  padding:8px 12px;
  font-size:14px;
}
.modebar{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.modebar button{
  width:auto;
  margin-top:0;
  padding:10px 16px;
}
.modebar button.active{
  background:#dfefff;
  border-color:#7aa7ff;
  font-weight:700;
}
.hidden{
  display:none;
}
</style>
</head>

<body>
<div class="card">

<h2>HVAC Note Tool</h2>
<div class="small" id="draftStatus"></div>

<div class="modebar">
  <button id="modePM" type="button" class="active">PM</button>
  <button id="modeService" type="button">SERVICE CALL</button>
</div>

<label>Location</label>
<input id="location" placeholder="Example: I'm at the Planet Fitness in Milwaukee on Main Street">

<!-- PM SECTION -->
<div id="pmSection">
  <label>Equipment on Site</label>
  <textarea id="equipment" placeholder="Example: one RTU, one furnace, one unit heater, two radiant heaters"></textarea>

  <div class="pillbar">
    <button id="addRTU" type="button">+ RTU</button>
    <button id="addF" type="button">+ Furnace</button>
    <button id="addUH" type="button">+ Unit Heater</button>
    <button id="addRH" type="button">+ Radiant Heater</button>
    <button id="addEF" type="button">+ Exhaust Fan</button>
    <button id="addMUA" type="button">+ MUA</button>
  </div>

  <label>Notes / Repairs</label>
  <textarea id="notes" placeholder="Leave blank if everything is running good."></textarea>

  <label>Parts used</label>
  <textarea id="used" placeholder="Example: two 4l190 belts and two 20 by 24 by 2 filters"></textarea>

  <label>Cost of parts</label>
  <input id="cost" placeholder="Example: $23">

  <label>Parts needed next PM</label>
  <div class="inline">
    <div class="grow">
      <textarea id="next" placeholder="Tap Same if identical to Parts used"></textarea>
    </div>
    <button id="same" type="button">Same</button>
  </div>

  <label>Work done</label>
  <input id="workdone">
</div>

<!-- SERVICE SECTION -->
<div id="serviceSection" class="hidden">
  <label>Equipment worked on</label>
  <textarea id="serviceEquipment" placeholder="Example: RTU1 or THERMOSTAT or RTU1, THERMOSTAT"></textarea>

  <label>Reason for call</label>
  <textarea id="reason" placeholder="Example: No heat in lobby."></textarea>

  <label>Findings / Diagnosis</label>
  <textarea id="diagnosis" placeholder="Example: RTU1 heat exchanger is cracked."></textarea>

  <label>Repairs made</label>
  <textarea id="repairsMade" placeholder="Example: Confirmed failure and shut unit down."></textarea>

  <label>Parts used</label>
  <textarea id="serviceUsed" placeholder="Example: two 4l190 belts and one 16 by 25 by one"></textarea>

  <label>Cost of parts</label>
  <input id="serviceCost" placeholder="Example: $23">

  <label>Recommendations / Next steps</label>
  <textarea id="recommendations" placeholder="Example: Replace RTU1 due to cracked heat exchanger."></textarea>
</div>

<button id="generate" type="button">Generate Report</button>
<button id="copy" type="button">Copy Report</button>
<button id="clear" type="button">Clear Current Mode</button>

<label>Output</label>
<pre id="output"></pre>

</div>

<script>
/* ---------- basics ---------- */
function pad2(n){
  return String(n).padStart(2, "0");
}

function today(){
  const d = new Date();
  return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
}

const DEFAULT_PM_WORKDONE = "Changed filters/belts and verified operations of equipment";
const DEFAULT_PM_NOTES = "All units are running good at this time.";
const DRAFT_KEY = "hvac_note_tool_v14";

const KNOWN_FILTER_SIZES = [
  "14X20X1",
  "16X16X2","16X20X2","16X24X2","16X25X1","16X25X2",
  "18X20X2","18X24X2","18X25X2",
  "20X20X2","20X24X2","20X25X2","20X30X2","20X35X2",
  "24X24X1","24X24X2","24X24X4"
];

const KNOWN_BELTS = [
  "4L190","4L200","4L270",
  "AX20","AX22","AX23","AX25","AX26","AX32","AX35","AX36","AX37","AX39","AX40","AX41","AX44","AX46","AX48","AX49","AX51","AX52","AX53","AX54","AX58","AX61",
  "BX38","BX42","BX44","BX46","BX49","BX54","BX56","BX57","BX61","BX62","BX64","BX65","BX66","BX68","BX75","BX81","BX96",
  "A20","A22","A23","A25","A26","A32","A35","A36","A37","A39","A40","A41","A44","A46","A48","A49","A51","A52","A53","A54","A58","A61",
  "B38","B42","B44","B46","B49","B54","B56","B57","B61","B62","B64","B65","B66","B68","B75","B81","B96"
];

const NUM_MAP = {
  zero:"0",
  one:"1", two:"2", three:"3", four:"4", five:"5",
  six:"6", seven:"7", eight:"8", nine:"9", ten:"10",
  ones:"1", twos:"2", threes:"3", fours:"4", fives:"5",
  to:"2", too:"2"
};

const EQUIP_LABELS = {
  RTU:"Rooftop Unit",
  F:"Furnace",
  UH:"Unit Heater",
  RH:"Radiant Heater",
  EF:"Exhaust Fan",
  MUA:"Make-Up Air Unit"
};

let currentMode = "PM";

/* ---------- helpers ---------- */
function convertNumbers(text){
  let t = text || "";
  Object.keys(NUM_MAP).forEach(k => {
    const r = new RegExp("\\b" + k + "\\b", "gi");
    t = t.replace(r, NUM_MAP[k]);
  });
  return t;
}

function levenshtein(a, b){
  const m = a.length;
  const n = b.length;
  const dp = Array.from({length:m + 1}, () => Array(n + 1).fill(0));
  for(let i = 0; i <= m; i++) dp[i][0] = i;
  for(let j = 0; j <= n; j++) dp[0][j] = j;
  for(let i = 1; i <= m; i++){
    for(let j = 1; j <= n; j++){
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(
        dp[i - 1][j] + 1,
        dp[i][j - 1] + 1,
        dp[i - 1][j - 1] + cost
      );
    }
  }
  return dp[m][n];
}

function closestMatch(value, list, maxDistance){
  let best = value;
  let bestScore = Infinity;
  list.forEach(item => {
    const d = levenshtein(value.toUpperCase(), item.toUpperCase());
    if(d < bestScore){
      bestScore = d;
      best = item;
    }
  });
  return bestScore <= maxDistance ? best : value;
}

function autoGrow(el){
  if(!el) return;
  el.style.height = "auto";
  el.style.height = Math.max(el.scrollHeight, 90) + "px";
}

/* ---------- location ---------- */
function titleCaseWords(str){
  return str
    .split(" ")
    .filter(Boolean)
    .map(w => {
      const upper = w.toUpperCase();
      if(/^\d/.test(w)) return w;
      if(["NW","NE","SW","SE"].includes(upper)) return upper;
      return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
    })
    .join(" ");
}

function normalizeStreetSuffix(street){
  let s = street.trim().toLowerCase();
  s = s.replace(/\bavenue\b/g, "Ave.");
  s = s.replace(/\bstreet\b/g, "St.");
  s = s.replace(/\broad\b/g, "Rd.");
  s = s.replace(/\bdrive\b/g, "Dr.");
  s = s.replace(/\bboulevard\b/g, "Blvd.");
  s = s.replace(/\blane\b/g, "Ln.");
  s = s.replace(/\bcourt\b/g, "Ct.");
  s = s.replace(/\bplace\b/g, "Pl.");
  s = s.replace(/\bhighway\b/g, "Hwy.");
  return titleCaseWords(s);
}

function normalizeSiteName(name){
  let s = (name || "").trim().toLowerCase();
  s = s.replace(/\bthe\b/g, " ");
  s = s.replace(/\s{2,}/g, " ").trim();
  s = s.replace(/\btake five\b/g, "take 5");
  s = s.replace(/\bplanet fitness\b/g, "planet fitness");

  return titleCaseWords(s)
    .replace(/\bTake 5\b/g, "Take 5")
    .replace(/\bPlanet Fitness\b/g, "Planet Fitness");
}

function formatLocation(raw){
  let t = (raw || "").trim().toLowerCase();
  if(!t) return "";

  t = t.replace(/[.,]/g, " ");
  t = t.replace(/\bi am at\b/g, "");
  t = t.replace(/\bim at\b/g, "");
  t = t.replace(/\bi'm at\b/g, "");
  t = t.replace(/\bwe are at\b/g, "");
  t = t.replace(/\s{2,}/g, " ").trim();

  t = t.replace(/\btake five\b/g, "take 5");
  t = t.replace(/\bplanet fitness\b/g, "planet fitness");

  let m;

  // site in city on street
  m = t.match(/^(.+?)\s+in\s+(.+?)\s+on\s+(.+)$/i);
  if(m){
    const site = normalizeSiteName(m[1]);
    const city = titleCaseWords(m[2].trim());
    const street = normalizeStreetSuffix(m[3].trim());
    return `${site} - ${city} - ${street}`;
  }

  // site on street in city
  m = t.match(/^(.+?)\s+on\s+(.+?)\s+in\s+(.+)$/i);
  if(m){
    const site = normalizeSiteName(m[1]);
    const street = normalizeStreetSuffix(m[2].trim());
    const city = titleCaseWords(m[3].trim());
    return `${site} - ${city} - ${street}`;
  }

  return normalizeSiteName(t);
}

/* ---------- equipment parsing ---------- */
function normalizeEquipmentSpeech(text){
  let t = (text || "").toLowerCase();
  t = t.replace(/\n/g, " ");
  t = t.replace(/[–—]/g, "-");
  t = t.replace(/\s+and\s+/g, ", ");
  t = t.replace(/\s{2,}/g, " ").trim();

  t = t.replace(/\bare\s*to\s*you\b/g, "rtu");
  t = t.replace(/\bar\s*to\s*you\b/g, "rtu");
  t = t.replace(/\br\s*to\s*you\b/g, "rtu");
  t = t.replace(/\br\s*too\s*you\b/g, "rtu");
  t = t.replace(/\br\s*two\s*you\b/g, "rtu");
  t = t.replace(/\br\s*t\s*u\b/g, "rtu");
  t = t.replace(/\brt\s*you\b/g, "rtu");
  t = t.replace(/\brt\s*u\b/g, "rtu");
  t = t.replace(/\brt\b/g, "rtu");
  t = t.replace(/\bhour\s*to\s*you\b/g, "rtu");
  t = t.replace(/\bone\s*hour\s*to\s*you\b/g, "1 rtu");
  t = t.replace(/\b1\s*hour\s*to\s*you\b/g, "1 rtu");

  t = t.replace(/\bfurnaces?\b/g, "furnace");
  t = t.replace(/\bunit heaters?\b/g, "unit heater");
  t = t.replace(/\bradiant heaters?\b/g, "radiant heater");
  t = t.replace(/\bexhaust fans?\b/g, "exhaust fan");
  t = t.replace(/\bmake[\s-]?up air(?: unit)?s?\b/g, "mua");
  t = t.replace(/\brooftop units?\b/g, "rtu");

  t = convertNumbers(t);
  return t;
}

function expandEquipmentCounts(text){
  let t = normalizeEquipmentSpeech(text);

  const patterns = [
    {re:/\b(\d+)\s*rtu\b/g, code:"RTU"},
    {re:/\b(\d+)\s*furnace\b/g, code:"F"},
    {re:/\b(\d+)\s*unit heater\b/g, code:"UH"},
    {re:/\b(\d+)\s*radiant heater\b/g, code:"RH"},
    {re:/\b(\d+)\s*exhaust fan\b/g, code:"EF"},
    {re:/\b(\d+)\s*mua\b/g, code:"MUA"}
  ];

  const out = [];
  patterns.forEach(p => {
    let m;
    while((m = p.re.exec(t)) !== null){
      const count = parseInt(m[1], 10);
      if(!Number.isNaN(count) && count > 0 && count < 50){
        for(let i = 1; i <= count; i++) out.push(p.code + i);
      }
    }
  });

  const directMatches = [...t.matchAll(/\b(RTU|RH|UH|F|EF|MUA)\s*-?\s*(\d+)\b/gi)];
  directMatches.forEach(m => {
    out.push(m[1].toUpperCase() + m[2]);
  });

  const unique = [];
  out.forEach(x => {
    if(!unique.includes(x)) unique.push(x);
  });

  return unique.join(", ");
}

function parseEquipCodes(codeCsv){
  return (codeCsv || "").split(",").map(s => s.trim()).filter(Boolean);
}

function expandEquipment(codeCsv){
  const codes = parseEquipCodes(codeCsv);
  if(!codes.length) return "Not listed";
  return codes.map(c => {
    const m = c.match(/^([A-Z]+)(\d+)$/);
    if(!m) return c;
    const label = EQUIP_LABELS[m[1]] || m[1];
    return `${m[1]}${m[2]} (${label})`;
  }).join("\n");
}

function firstUnitOfType(codes, type){
  return codes.find(c => c.startsWith(type)) || null;
}

function formatEquipmentFieldValue(raw){
  const codes = expandEquipmentCounts(raw);
  return codes || raw;
}

/* ---------- service equipment ---------- */
function normalizeServiceEquipment(raw){
  let t = (raw || "").trim();
  if(!t) return "";

  const parsed = expandEquipmentCounts(t);
  if(parsed) return parsed;

  return t
    .replace(/\s+and\s+/gi, ", ")
    .split(/[,;]+/)
    .map(s => s.trim())
    .filter(Boolean)
    .map(s => s.toUpperCase())
    .join(", ");
}

/* ---------- parts parsing ---------- */
function normalizeFilterSize(rawSize){
  let s = (rawSize || "").toUpperCase().trim();
  s = s.replace(/\bbuy\b/gi, "BY");
  s = convertNumbers(s);
  s = s.replace(/\s+BY\s+/gi, "X");
  s = s.replace(/\s*X\s*/gi, "X");
  s = s.replace(/\s+/g, "");
  s = s.replace(/[^0-9X]/g, "");

  const nums = s.split("X").filter(Boolean);
  if(nums.length === 3){
    s = `${nums[0]}X${nums[1]}X${nums[2]}`;
  }

  return closestMatch(s, KNOWN_FILTER_SIZES, 2).toUpperCase();
}

function normalizeBeltCode(rawCode){
  let s = (rawCode || "").toUpperCase().trim();
  s = s.replace(/\s+/g, "");
  s = s.replace(/[-_]/g, "");
  const m = s.match(/^(AX|BX|A|B|4L)(\d+)$/);
  if(m){
    const code = m[1] + m[2];
    return closestMatch(code, KNOWN_BELTS, 1).toUpperCase();
  }
  return closestMatch(s, KNOWN_BELTS, 1).toUpperCase();
}

function formatPartOutput(qty, value){
  return `${qty} - ${String(value).toUpperCase()}`;
}

function recoverConcatenatedFilter(firstNum, secondNum, thirdNum){
  const a = String(firstNum);
  const b = String(secondNum);
  const c = String(thirdNum);

  for(let i = 1; i < a.length; i++){
    const qty = a.slice(0, i);
    const firstDim = a.slice(i);
    const candidate = `${firstDim}X${b}X${c}`;
    const matched = closestMatch(candidate, KNOWN_FILTER_SIZES, 2);
    if(KNOWN_FILTER_SIZES.includes(matched)){
      return `${parseInt(qty, 10)} - ${matched}`;
    }
  }
  return null;
}

function parsePartItem(item){
  let t = item.toLowerCase().trim();
  if(!t) return [];

  t = t.replace(/\bbuy\b/g, "by");
  t = convertNumbers(t);
  t = t.replace(/\s{2,}/g, " ").trim();

  // filler words gone
  t = t.replace(/\bfilters?\b/g, "").trim();
  t = t.replace(/\bbelts?\b/g, "").trim();

  // BELTS
  let beltMatch = t.match(/^(\d+)\s+(ax|bx|a|b|4l)\s*-?\s*(\d+)$/i);
  if(beltMatch){
    const qty = parseInt(beltMatch[1], 10);
    const code = normalizeBeltCode(beltMatch[2] + beltMatch[3]);
    return [formatPartOutput(qty, code)];
  }

  beltMatch = t.match(/^(\d+)(ax|bx|a|b|4l)\s*-?\s*(\d+)$/i);
  if(beltMatch){
    const qty = parseInt(beltMatch[1], 10);
    const code = normalizeBeltCode(beltMatch[2] + beltMatch[3]);
    return [formatPartOutput(qty, code)];
  }

  beltMatch = t.match(/^(\d+)\s+(4)\s*l\s*(\d+)$/i);
  if(beltMatch){
    const qty = parseInt(beltMatch[1], 10);
    const code = normalizeBeltCode(`4L${beltMatch[3]}`);
    return [formatPartOutput(qty, code)];
  }

  // FILTERS
  let f = t;
  f = f.replace(/\s+by\s+/g, " x ");
  f = f.replace(/\s*x\s*/g, " x ");
  f = f.replace(/\s{2,}/g, " ").trim();

  let m = f.match(/^(\d+)\s+(\d+)\s+(\d+)\s*x\s*(\d+)$/i);
  if(m){
    const qty = parseInt(m[1], 10);
    const size = normalizeFilterSize(`${m[2]}x${m[3]}x${m[4]}`);
    return [formatPartOutput(qty, size)];
  }

  m = f.match(/^(\d+)\s+(\d+)\s*x\s*(\d+)\s*x\s*(\d+)$/i);
  if(m){
    const qty = parseInt(m[1], 10);
    const size = normalizeFilterSize(`${m[2]}x${m[3]}x${m[4]}`);
    return [formatPartOutput(qty, size)];
  }

  m = f.match(/^(\d+)x(\d+)x(\d+)x(\d+)$/i);
  if(m){
    const qty = parseInt(m[1], 10);
    const size = normalizeFilterSize(`${m[2]}x${m[3]}x${m[4]}`);
    return [formatPartOutput(qty, size)];
  }

  m = f.match(/^(\d+)\s+(\d+x\d+x\d+)$/i);
  if(m){
    const qty = parseInt(m[1], 10);
    const size = normalizeFilterSize(m[2]);
    return [formatPartOutput(qty, size)];
  }

  m = f.match(/^(\d+)\s+(\d+)\s*x\s*(\d+)$/i);
  if(m){
    const recovered = recoverConcatenatedFilter(m[1], m[2], m[3]);
    if(recovered) return [recovered];
  }

  const nums = f.match(/\d+/g);
  if(nums && nums.length === 4){
    const qty = parseInt(nums[0], 10);
    const size = normalizeFilterSize(`${nums[1]}x${nums[2]}x${nums[3]}`);
    return [formatPartOutput(qty, size)];
  }

  if(nums && nums.length === 3){
    const recovered = recoverConcatenatedFilter(nums[0], nums[1], nums[2]);
    if(recovered) return [recovered];
  }

  const beltNums = f.match(/^(\d+)\s*(ax|bx|a|b|4l)\s*(\d+)$/i);
  if(beltNums){
    const qty = parseInt(beltNums[1], 10);
    const code = normalizeBeltCode(beltNums[2] + beltNums[3]);
    return [formatPartOutput(qty, code)];
  }

  return [item.trim().toUpperCase()];
}

function normalizeParts(text){
  let t = (text || "").trim();
  if(!t) return "";

  t = t.replace(/\n/g, " ");
  t = t.replace(/\s+and\s+/gi, ", ");
  t = t.replace(/\s{2,}/g, " ").trim();

  const items = t.split(/[,;]+/).map(s => s.trim()).filter(Boolean);
  const out = [];

  items.forEach(item => {
    parsePartItem(item).forEach(x => {
      const cleaned = String(x)
        .replace(/\bFILTERS?\b/gi, "")
        .replace(/\bBELTS?\b/gi, "")
        .replace(/\s{2,}/g, " ")
        .trim()
        .toUpperCase();
      if(cleaned) out.push(cleaned);
    });
  });

  return out.join(", ");
}

/* ---------- notes ---------- */
function normalizeNotesForParsing(text){
  let t = (text || "").trim().toLowerCase();
  t = t.replace(/\n/g, " ");
  t = t.replace(/\s{2,}/g, " ").trim();

  t = t.replace(/\bare\s*to\s*you\b/g,"rtu");
  t = t.replace(/\bar\s*to\s*you\b/g,"rtu");
  t = t.replace(/\br\s*to\s*you\b/g,"rtu");
  t = t.replace(/\br\s*too\s*you\b/g,"rtu");
  t = t.replace(/\br\s*two\s*you\b/g,"rtu");
  t = t.replace(/\br\s*t\s*u\b/g,"rtu");
  t = t.replace(/\brt\s*you\b/g,"rtu");
  t = t.replace(/\brt\s*u\b/g,"rtu");
  t = t.replace(/\brt\b/g,"rtu");
  t = t.replace(/\bhour\s*to\s*you\b/g,"rtu");

  t = t.replace(/\bfurnaces?\b/g,"furnace");
  t = t.replace(/\bunit heaters?\b/g,"unit heater");
  t = t.replace(/\bradiant heaters?\b/g,"radiant heater");
  t = t.replace(/\bexhaust fans?\b/g,"exhaust fan");
  t = t.replace(/\bmake[\s-]?up air(?: unit)?s?\b/g,"mua");
  t = t.replace(/\brooftop units?\b/g,"rtu");

  t = convertNumbers(t);
  t = t.replace(/\b(rtu|rh|uh|f|ef|mua)\s*(\d+)\b/gi, (_, a, n) => `${a.toUpperCase()}${n}`);
  return t;
}

function extractRepairsFromNotes(notesText, equipCodes){
  const text = (notesText || "").trim();
  if(!text) return {general:"", repairs:[]};

  const pieces = text
    .replace(/\r/g,"")
    .split(/\n+|(?<=[.?!])\s+/)
    .map(s => s.trim())
    .filter(Boolean);

  const repairs = [];
  const general = [];

  function looksLikeRepair(s){
    return /\b(needs?|need|replace|replaced|failed|bad|broken|repair|recommend|suggest|not working|no heat|no cooling|leaking|motor|belt|capacitor|blower|fan|heat exchanger|cracked)\b/i.test(s);
  }

  pieces.forEach(piece => {
    const norm = normalizeNotesForParsing(piece);
    let unit = null;

    const explicit = norm.match(/\b(RTU|RH|UH|F|EF|MUA)\d+\b/i);
    if(explicit) unit = explicit[0].toUpperCase();

    if(!unit && /\brtu\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "RTU");
    if(!unit && /\bfurnace\b|\bf\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "F");
    if(!unit && /\bunit heater\b|\buh\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "UH");
    if(!unit && /\bradiant heater\b|\brh\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "RH");
    if(!unit && /\bexhaust fan\b|\bef\b/i.test(norm)) unit = firstUnitOfType(equipCodes, "EF");
    if(!unit && /\bmua\b|make up air/i.test(norm)) unit = firstUnitOfType(equipCodes, "MUA");

    if(unit && looksLikeRepair(norm)){
      let msg = piece.trim();
      msg = msg.replace(/^(rtu|rt|furnace|unit heater|radiant heater|exhaust fan|make[\s-]?up air|mua|ef|rh|uh|f)\s*-?\s*(one|two|three|four|five|six|seven|eight|nine|ten|\d+)?\s*/i, "");
      msg = msg.replace(/^\s*[:\-–]\s*/, "");
      if(!msg) msg = "Repair needed.";
      repairs.push(`${unit} - ${msg}`);
    } else {
      general.push(piece);
    }
  });

  return {
    general: general.join(" ").trim(),
    repairs
  };
}

/* ---------- draft ---------- */
function getFields(){
  return {
    currentMode,
    location: document.getElementById("location").value || "",

    equipment: document.getElementById("equipment").value || "",
    notes: document.getElementById("notes").value || "",
    used: document.getElementById("used").value || "",
    cost: document.getElementById("cost").value || "",
    next: document.getElementById("next").value || "",
    workdone: document.getElementById("workdone").value || "",

    serviceEquipment: document.getElementById("serviceEquipment").value || "",
    reason: document.getElementById("reason").value || "",
    diagnosis: document.getElementById("diagnosis").value || "",
    repairsMade: document.getElementById("repairsMade").value || "",
    serviceUsed: document.getElementById("serviceUsed").value || "",
    serviceCost: document.getElementById("serviceCost").value || "",
    recommendations: document.getElementById("recommendations").value || "",

    output: document.getElementById("output").textContent || "",
    savedAt: new Date().toISOString()
  };
}

function setFields(d){
  currentMode = d.currentMode || "PM";
  applyMode();

  document.getElementById("location").value = d.location || "";

  document.getElementById("equipment").value = d.equipment || "";
  document.getElementById("notes").value = d.notes || "";
  document.getElementById("used").value = d.used || "";
  document.getElementById("cost").value = d.cost || "";
  document.getElementById("next").value = d.next || "";
  document.getElementById("workdone").value = d.workdone || DEFAULT_PM_WORKDONE;

  document.getElementById("serviceEquipment").value = d.serviceEquipment || "";
  document.getElementById("reason").value = d.reason || "";
  document.getElementById("diagnosis").value = d.diagnosis || "";
  document.getElementById("repairsMade").value = d.repairsMade || "";
  document.getElementById("serviceUsed").value = d.serviceUsed || "";
  document.getElementById("serviceCost").value = d.serviceCost || "";
  document.getElementById("recommendations").value = d.recommendations || "";

  document.getElementById("output").textContent = d.output || "";

  ["equipment","notes","used","next","serviceEquipment","reason","diagnosis","repairsMade","serviceUsed","recommendations"].forEach(id => {
    autoGrow(document.getElementById(id));
  });
}

function saveDraft(){
  try{
    localStorage.setItem(DRAFT_KEY, JSON.stringify(getFields()));
    document.getElementById("draftStatus").textContent = "Draft saved.";
  }catch(e){}
}

function loadDraft(){
  const raw = localStorage.getItem(DRAFT_KEY);
  if(!raw) return false;
  try{
    const d = JSON.parse(raw);
    setFields(d);
    if(d.savedAt){
      const dt = new Date(d.savedAt);
      document.getElementById("draftStatus").textContent = "Restored draft from " + dt.toLocaleString();
    } else {
      document.getElementById("draftStatus").textContent = "Restored draft.";
    }
    return true;
  }catch(e){
    return false;
  }
}

/* ---------- immediate field formatting ---------- */
function formatLocationField(){
  const el = document.getElementById("location");
  const current = el.value;
  if(current.trim()){
    el.value = formatLocation(current);
    saveDraft();
  }
}

function formatEquipmentField(){
  const el = document.getElementById("equipment");
  const current = el.value;
  if(current.trim()){
    el.value = formatEquipmentFieldValue(current);
    autoGrow(el);
    saveDraft();
  }
}

function formatUsedField(){
  const el = document.getElementById("used");
  const current = el.value;
  if(current.trim()){
    el.value = normalizeParts(current);
    autoGrow(el);
    saveDraft();
  }
}

function formatNextField(){
  const el = document.getElementById("next");
  const current = el.value;
  if(current.trim()){
    el.value = normalizeParts(current);
    autoGrow(el);
    saveDraft();
  }
}

function formatServiceEquipmentField(){
  const el = document.getElementById("serviceEquipment");
  const current = el.value;
  if(current.trim()){
    el.value = normalizeServiceEquipment(current);
    autoGrow(el);
    saveDraft();
  }
}

function formatServiceUsedField(){
  const el = document.getElementById("serviceUsed");
  const current = el.value;
  if(current.trim()){
    el.value = normalizeParts(current);
    autoGrow(el);

}

/* ---------- mode switching ---------- */
function applyMode(){
  const pmBtn = document.getElementById("modePM");
  const serviceBtn = document.getElementById("modeService");
  const pmSection = document.getElementById("pmSection");
  const serviceSection = document.getElementById("serviceSection");

  if(currentMode === "PM"){
    pmBtn.classList.add("active");
    serviceBtn.classList.remove("active");
    pmSection.classList.remove("hidden");
    serviceSection.classList.add("hidden");
  } else {
    serviceBtn.classList.add("active");
    pmBtn.classList.remove("active");
    serviceSection.classList.remove("hidden");
    pmSection.classList.add("hidden");
  }
}

document.getElementById("modePM").onclick = function(){
  currentMode = "PM";
  applyMode();
  saveDraft();
};

document.getElementById("modeService").onclick = function(){
  currentMode = "SERVICE";
  applyMode();
  saveDraft();
};

/* ---------- ui actions ---------- */
document.getElementById("same").onclick = function(){
  document.getElementById("next").value = document.getElementById("used").value;
  autoGrow(document.getElementById("next"));
  formatNextField();
};

document.getElementById("generate").onclick = function(){
  formatLocationField();
  const location = formatLocation(document.getElementById("location").value || "[Location]") || "[Location]";
  const date = today();

  let report = "";

  if(currentMode === "PM"){
    formatEquipmentField();
    formatUsedField();
    formatNextField();

    const equipRaw = document.getElementById("equipment").value || "";
    const equipCodes = parseEquipCodes(equipRaw);
    const equip = expandEquipment(equipRaw);

    const notesRaw = (document.getElementById("notes").value || "").trim();
    const extracted = extractRepairsFromNotes(notesRaw, equipCodes);

    let notesFinal = DEFAULT_PM_NOTES;
    if(extracted.general){
      notesFinal = extracted.general;
    } else if(extracted.repairs.length){
      notesFinal = extracted.repairs.join("\n");
    }

    const used = document.getElementById("used").value.trim() ? normalizeParts(document.getElementById("used").value) : "NONE";
    const next = document.getElementById("next").value.trim() ? normalizeParts(document.getElementById("next").value) : "NONE";
    const cost = document.getElementById("cost").value || "Unknown";
    const workdone = document.getElementById("workdone").value || DEFAULT_PM_WORKDONE;

    report = `PM

Location:
${location}

Date:
${date}

Equipment on Site:
${equip}

Notes / Repairs:
${notesFinal}

Work done:
${workdone}

Parts used:
${used}

Cost of parts (if known):
${cost}

Parts needed next PM:
${next}

Pictures:
Nameplate photos attached.
`;
  } else {
    formatServiceEquipmentField();
    formatServiceUsedField();

    const serviceEquipRaw = document.getElementById("serviceEquipment").value || "";
    const serviceEquipDisplay = parseEquipCodes(serviceEquipRaw).length
      ? expandEquipment(serviceEquipRaw)
      : (serviceEquipRaw || "Not listed");

    const reason = document.getElementById("reason").value.trim() || "Not listed.";
    const diagnosis = document.getElementById("diagnosis").value.trim() || "Not listed.";
    const repairsMade = document.getElementById("repairsMade").value.trim() || "None.";
    const used = document.getElementById("serviceUsed").value.trim() ? normalizeParts(document.getElementById("serviceUsed").value) : "NONE";
    const cost = document.getElementById("serviceCost").value || "Unknown";
    const recommendations = document.getElementById("recommendations").value.trim() || "None.";

    report = `SERVICE CALL

Location:
${location}

Date:
${date}

Equipment worked on:
${serviceEquipDisplay}

Reason for call:
${reason}

Findings / Diagnosis:
${diagnosis}

Repairs made:
${repairsMade}

Parts used:
${used}

Cost of parts (if known):
${cost}

Recommendations / Next steps:
${recommendations}

Pictures:
Nameplate photos attached.
`;
  }

  document.getElementById("output").textContent = report;
  saveDraft();
};

document.getElementById("copy").onclick = function(){
  const text = document.getElementById("output").textContent || "";
  if(!text.trim()) return;
  navigator.clipboard.writeText(text);
};

document.getElementById("clear").onclick = function(){
  if(!confirm("Clear current mode fields?")) return;

  document.getElementById("location").value = "";
  document.getElementById("output").textContent = "";

  if(currentMode === "PM"){
    document.getElementById("equipment").value = "";
    document.getElementById("notes").value = "";
    document.getElementById("used").value = "";
    document.getElementById("cost").value = "";
    document.getElementById("next").value = "";
    document.getElementById("workdone").value = DEFAULT_PM_WORKDONE;

    autoGrow(document.getElementById("equipment"));
    autoGrow(document.getElementById("notes"));
    autoGrow(document.getElementById("used"));
    autoGrow(document.getElementById("next"));
  } else {
    document.getElementById("serviceEquipment").value = "";
    document.getElementById("reason").value = "";
    document.getElementById("diagnosis").value = "";
    document.getElementById("repairsMade").value = "";
    document.getElementById("serviceUsed").value = "";
    document.getElementById("serviceCost").value = "";
    document.getElementById("recommendations").value = "";

    autoGrow(document.getElementById("serviceEquipment"));
    autoGrow(document.getElementById("reason"));
    autoGrow(document.getElementById("diagnosis"));
    autoGrow(document.getElementById("repairsMade"));
    autoGrow(document.getElementById("serviceUsed"));
    autoGrow(document.getElementById("recommendations"));
  }

  document.getElementById("draftStatus").textContent = "Cleared.";
  saveDraft();
};

function addEquipmentCode(prefix){
  const current = (document.getElementById("equipment").value || "").trim();
  const codes = parseEquipCodes(current);
  let max = 0;

  codes.forEach(c => {
    const m = c.match(new RegExp("^" + prefix + "(\\d+)$"));
    if(m) max = Math.max(max, parseInt(m[1], 10));
  });

  const nextNum = max + 1;
  const appendText = current ? current + ", " + prefix + nextNum : prefix + nextNum;
  document.getElementById("equipment").value = appendText;
  autoGrow(document.getElementById("equipment"));
  saveDraft();
}

document.getElementById("addRTU").onclick = () => addEquipmentCode("RTU");
document.getElementById("addF").onclick = () => addEquipmentCode("F");
document.getElementById("addUH").onclick = () => addEquipmentCode("UH");
document.getElementById("addRH").onclick = () => addEquipmentCode("RH");
document.getElementById("addEF").onclick = () => addEquipmentCode("EF");
document.getElementById("addMUA").onclick = () => addEquipmentCode("MUA");

function addEnterFormatter(id, formatter){
  document.getElementById(id).addEventListener("keydown", (e) => {
    if(
      e.key === "Enter" &&
      !["notes","reason","diagnosis","repairsMade","recommendations"].includes(id)
    ){
      e.preventDefault();
      formatter();
      e.target.blur();
    }
  });
}

function wireAutosave(){
  [
    "location","equipment","notes","used","cost","next","workdone",
    "serviceEquipment","reason","diagnosis","repairsMade","serviceUsed","serviceCost","recommendations"
  ].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener("input", () => {
      saveDraft();
      if(el.tagName.toLowerCase() === "textarea"){
        autoGrow(el);
      }
    });
  });

  document.getElementById("location").addEventListener("blur", formatLocationField);
  document.getElementById("equipment").addEventListener("blur", formatEquipmentField);
  document.getElementById("used").addEventListener("blur", formatUsedField);
  document.getElementById("next").addEventListener("blur", formatNextField);
  document.getElementById("serviceEquipment").addEventListener("blur", formatServiceEquipmentField);
  document.getElementById("serviceUsed").addEventListener("blur", formatServiceUsedField);

  addEnterFormatter("location", formatLocationField);
  addEnterFormatter("equipment", formatEquipmentField);
  addEnterFormatter("used", formatUsedField);
  addEnterFormatter("next", formatNextField);
  addEnterFormatter("serviceEquipment", formatServiceEquipmentField);
  addEnterFormatter("serviceUsed", formatServiceUsedField);

  document.addEventListener("visibilitychange", () => {
    if(document.visibilityState === "hidden") saveDraft();
  });

  window.addEventListener("pagehide", saveDraft);
}

(function init(){
  document.getElementById("workdone").value = DEFAULT_PM_WORKDONE;
  applyMode();

  const restored = loadDraft();
  if(!restored){
    document.getElementById("draftStatus").textContent = "No saved draft yet.";
  }

  ["equipment","notes","used","next","serviceEquipment","reason","diagnosis","repairsMade","serviceUsed","recommendations"].forEach(id => {
    autoGrow(document.getElementById(id));
  });

  wireAutosave();
})();
</script>
