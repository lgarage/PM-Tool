<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PM Note Tool (v1)</title>
  <style>
    body { font-family: -apple-system, system-ui, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; }
    .card { max-width: 760px; margin: 0 auto; }
    label { display: block; font-weight: 600; margin-top: 14px; }
    input, textarea { width: 100%; font-size: 16px; padding: 10px; margin-top: 6px; box-sizing: border-box; }
    textarea { min-height: 90px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row > div { flex: 1 1 240px; }
    button { font-size: 16px; padding: 12px 14px; margin-top: 14px; width: 100%; }
    .small { font-size: 13px; opacity: 0.8; margin-top: 6px; }
    pre { white-space: pre-wrap; word-wrap: break-word; background: #f6f6f6; padding: 12px; border-radius: 8px; }
    .pillbar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .pill { font-size: 14px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 999px; background: #fff; width: auto; }
  </style>
</head>
<body>
  <div class="card">
    <h2>PM Note Tool (v1)</h2>
    <div class="small">
      Equipment: speak “RTU one, furnace one, radiant heater one and radiant heater two” → RTU1/F1/RH1/RH2.
      Parts: speak “one 16 by 25 by one and two 20 by 25 by twos” → 1 – 16x25x1, 2 – 20x25x2.
    </div>

    <label>Location</label>
    <input id="location" placeholder="Take 5 – Racine" />

    <div class="row">
      <div>
        <label>Date</label>
        <input id="date" />
      </div>
      <div>
        <label>Work done (default)</label>
        <input id="workdone" />
      </div>
    </div>

    <label>Equipment on Site</label>
    <textarea id="equipment" placeholder="Example: RTU1, F1, RH1, RH2, MUA1, EF1, UH1"></textarea>

    <div class="pillbar">
      <button class="pill" type="button" data-add="RTU">+ RTU</button>
      <button class="pill" type="button" data-add="F">+ Furnace</button>
      <button class="pill" type="button" data-add="RH">+ Radiant</button>
      <button class="pill" type="button" data-add="UH">+ Unit Heater</button>
      <button class="pill" type="button" data-add="MUA">+ MUA</button>
      <button class="pill" type="button" data-add="EF">+ Exhaust</button>
    </div>

    <label>Parts used (filters / belts / etc.)</label>
    <input id="used" placeholder="Example: one 16 by 25 by one and two 20 by 25 by twos" />

    <label>Cost of parts (if known)</label>
    <input id="partscost" placeholder="Example: $23 (or leave blank)" />

    <label>Parts needed for next PM</label>
    <input id="next" placeholder="Example: one 16 by 25 by one and two 20 by 25 by twos" />

    <label>Notes</label>
    <textarea id="notes" placeholder="Example: RH2 failed. Needs replacement."></textarea>

    <label>Recommended repairs (equipment-specific)</label>
    <textarea id="repairs" placeholder="Example: Replace RH2."></textarea>

    <button id="generate">Generate PM Report</button>
    <button id="copy">Copy Report</button>
    <button id="clear">Clear Form</button>

    <label>Output</label>
    <pre id="output">(Report will appear here)</pre>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function pad2(n) { return String(n).padStart(2, "0"); }
    function defaultDate() {
      const d = new Date();
      return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    }

    const EQUIP_MAP = new Map([
      ["RTU", "Rooftop Unit"],
      ["F", "Furnace"],
      ["RH", "Radiant Heater"],
      ["UH", "Unit Heater"],
      ["MUA", "Make-Up Air Unit"],
      ["EF", "Exhaust Fan"],
      ["AHU", "Air Handling Unit"],
      ["AC", "Condensing Unit"],
      ["HP", "Heat Pump"],
      ["ERV", "ERV"],
      ["HRV", "HRV"],
      ["DOAS", "DOAS"],
      ["FCU", "Fan Coil Unit"],
      ["VAV", "VAV Box"],
      ["B", "Boiler"],
      ["HWP", "Hot Water Pump"],
    ]);

    const WORD_TO_NUM = {
      "one": "1","two": "2","three": "3","four": "4","five": "5",
      "six": "6","seven": "7","eight": "8","nine": "9","ten": "10",
      "twos": "2","threes": "3","fours": "4","fives": "5"
    };

    function replaceWordNumbers(s) {
      let t = s;
      for (const [w, n] of Object.entries(WORD_TO_NUM)) {
        const re = new RegExp(`\\b${w}\\b`, "gi");
        t = t.replace(re, n);
      }
      return t;
    }

    // -------- EQUIPMENT NORMALIZER (fixes stray "and") --------
    function normalizeSpeechEquipment(text) {
      if (!text) return "";

      let t = text.replace(/\n+/g, " ").toLowerCase();

      // Remove filler "and" so it never becomes a token
      t = t.replace(/\s+and\s+/g, " ");

      // Phrase -> code
      const phraseMap = [
        ["rooftop unit", "rtu"],
        ["roof top unit", "rtu"],
        ["unit heater", "uh"],
        ["radiant heater", "rh"],
        ["make up air", "mua"],
        ["make-up air", "mua"],
        ["exhaust fan", "ef"],
        ["furnace", "f"],
      ];

      for (const [phrase, code] of phraseMap) {
        const safe = phrase.replace(/[-/\\^$*+?.()|[\]{}]/g, "\\$&");
        const re = new RegExp(`\\b${safe}\\b`, "g");
        t = t.replace(re, code);
      }

      t = replaceWordNumbers(t);

      // Join code + number: "rh 2" -> "RH2"
      t = t.replace(/\b(rtu|uh|rh|mua|ef|f)\s*(\d+)\b/g, (_, p1, p2) => `${p1.toUpperCase()}${p2}`);

      // Normalize separators
      t = t.replace(/\s{2,}/g, " ").trim();
      return t;
    }

    function expandEquipmentToken(token) {
      const t = token.trim();
      if (!t) return "";

      const compact = t.replace(/\s+/g, "");
      const m = compact.match(/^([A-Za-z]+)-?(\d+)$/);
      if (!m) return t;

      const prefix = m[1].toUpperCase();
      const num = m[2];
      const label = EQUIP_MAP.get(prefix);
      if (!label) return `${prefix}${num}`;
      return `${prefix}${num} (${label})`;
    }

    function expandEquipmentList(raw) {
      const text = (raw || "").trim();
      if (!text) return "Not listed";

      const chunks = text
        .split(/[\n,;]+/)
        .map(s => s.trim())
        .filter(Boolean);

      const tokens = [];
      for (const c of chunks) {
        const parts = c.split(/\s+/).filter(Boolean);
        if (parts.length <= 1) tokens.push(c);
        else parts.forEach(p => tokens.push(p));
      }

      const expanded = tokens.map(expandEquipmentToken).filter(Boolean);
      return expanded.join("\n");
    }

    // -------- PARTS NORMALIZER (forces "N – AxBxC") --------
    function normalizePartsInput(text) {
      if (!text) return "";

      let t = text.toLowerCase();

      // Convert "and" to commas for consistent splitting
      t = t.replace(/\s+and\s+/g, ", ");

      // Convert word numbers to digits (one -> 1, twos -> 2)
      t = replaceWordNumbers(t);

      // Convert "by" to x
      t = t.replace(/\s+by\s+/g, " x ");

      // Handle pattern: "20 25 x 2" (missing x between first two nums) -> "20x25x2"
      // Common dictation: "two 20 25 by twos"
      t = t.replace(/\b(\d+)\s+(\d+)\s*x\s*(\d+)\b/g, "$1x$2x$3");

      // Tighten standard: "14 x 20 x 2" -> "14x20x2"
      t = t.replace(/(\d+)\s*x\s*(\d+)\s*x\s*(\d+)/g, "$1x$2x$3");

      // Split into items (commas / semicolons)
      const rawItems = t.split(/[,;]+/).map(s => s.trim()).filter(Boolean);

      // For each item, extract a count and a size if possible.
      // Accept forms like:
      // "1 16x25x1"
      // "2 20x25x2 filters"
      // "1 – 16x25x1"
      const cleaned = [];
      for (const item of rawItems) {
        // Remove common filler words
        let it = item.replace(/\b(filters?|filter|pleated)\b/g, "").trim();

        // If it already has dash, normalize to en dash
        it = it.replace(/\b(\d+)\s*[-–]\s*(\d+x\d+x\d+)\b/g, "$1 – $2");

        // If it's "N SIZE", convert to "N – SIZE"
        it = it.replace(/\b(\d+)\s+(\d+x\d+x\d+)\b/g, "$1 – $2");

        // If someone just said "16x25x1" with no count, leave it as-is
        cleaned.push(it);
      }

      // Final cleanup: remove empties and normalize comma spacing
      const out = cleaned.map(s => s.trim()).filter(Boolean).join(", ");
      return out || "";
    }

    // -------- Draft save/load --------
    function loadDraft() {
      const raw = localStorage.getItem("pm_note_tool_draft_v1");
      if (!raw) return;
      try {
        const d = JSON.parse(raw);
        $("location").value = d.location || "";
        $("date").value = d.date || defaultDate();
        $("workdone").value = d.workdone || $("workdone").value;
        $("equipment").value = d.equipment || "";
        $("used").value = d.used || "";
        $("partscost").value = d.partscost || "";
        $("next").value = d.next || "";
        $("notes").value = d.notes || "";
        $("repairs").value = d.repairs || "";
        $("output").textContent = d.output || $("output").textContent;
      } catch {}
    }

    function saveDraft() {
      const payload = {
        location: $("location").value.trim(),
        date: $("date").value.trim(),
        workdone: $("workdone").value.trim(),
        equipment: $("equipment").value.trim(),
        used: $("used").value.trim(),
        partscost: $("partscost").value.trim(),
        next: $("next").value.trim(),
        notes: $("notes").value.trim(),
        repairs: $("repairs").value.trim(),
        output: $("output").textContent
      };
      localStorage.setItem("pm_note_tool_draft_v1", JSON.stringify(payload));
    }

    function generateReport() {
      const location = $("location").value.trim() || "[Location]";
      const date = $("date").value.trim() || defaultDate();
      const workdone = $("workdone").value.trim() || "Changed filters/belts and verified operations of equipment";

      const equipmentNormalized = normalizeSpeechEquipment($("equipment").value.trim());
      const equipmentExpanded = expandEquipmentList(equipmentNormalized);

      const usedRaw = $("used").value.trim();
      const nextRaw = $("next").value.trim();

      const used = usedRaw ? (normalizePartsInput(usedRaw) || usedRaw) : "None";
      const next = nextRaw ? (normalizePartsInput(nextRaw) || nextRaw) : "None";

      const partscostRaw = $("partscost").value.trim();
      const partscost = partscostRaw ? partscostRaw : "Unknown";

      const notes = $("notes").value.trim() || "None";
      const repairs = $("repairs").value.trim() || "";

      let report =
`PM

Location:
${location}

Date:
${date}

Equipment on Site:
${equipmentExpanded}

Note:
${notes}

Work done:
${workdone}

Parts used:
${used}

Cost of parts (if known):
${partscost}

Parts needed for next PM:
${next}
`;

      report += repairs
        ? `\nRecommended repairs:\n${repairs}\n`
        : `\nRecommended repairs:\nNone\n`;

      report += `\nPictures:\nNameplate photos attached.\n`;

      $("output").textContent = report;
      saveDraft();
    }

    async function copyReport() {
      const text = $("output").textContent;
      try {
        await navigator.clipboard.writeText(text);
        alert("Copied.");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        alert("Copied.");
      }
    }

    function clearForm() {
      if (!confirm("Clear this form?")) return;
      $("location").value = "";
      $("date").value = defaultDate();
      $("workdone").value = "Changed filters/belts and verified operations of equipment";
      $("equipment").value = "";
      $("used").value = "";
      $("partscost").value = "";
      $("next").value = "";
      $("notes").value = "";
      $("repairs").value = "";
      $("output").textContent = "(Report will appear here)";
      saveDraft();
    }

    function nextNumberFor(prefix, currentText) {
      const re = new RegExp(`\\b${prefix}\\s*-?\\s*(\\d+)\\b`, "gi");
      let max = 0;
      let m;
      while ((m = re.exec(currentText)) !== null) {
        const n = parseInt(m[1], 10);
        if (!Number.isNaN(n)) max = Math.max(max, n);
      }
      return max + 1;
    }

    function addEquip(prefix) {
      const current = $("equipment").value.trim();
      const n = nextNumberFor(prefix, current);
      const token = `${prefix}${n}`;
      const sep = current ? (current.endsWith("\n") ? "" : "\n") : "";
      $("equipment").value = current + sep + token;
      $("equipment").dispatchEvent(new Event("input"));
    }

    $("date").value = defaultDate();
    $("workdone").value = "Changed filters/belts and verified operations of equipment";

    ["location","date","workdone","equipment","used","partscost","next","notes","repairs"].forEach(id => {
      $(id).addEventListener("input", saveDraft);
    });

    $("generate").addEventListener("click", generateReport);
    $("copy").addEventListener("click", copyReport);
    $("clear").addEventListener("click", clearForm);

    document.querySelectorAll("button.pill[data-add]").forEach(btn => {
      btn.addEventListener("click", () => addEquip(btn.getAttribute("data-add")));
    });

    loadDraft();
  </script>
</body>
</html>
