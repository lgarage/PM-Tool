<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PM Capture (v1)</title>
  <style>
    body { font-family: -apple-system, system-ui, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; }
    .card { max-width: 760px; margin: 0 auto; }
    label { display: block; font-weight: 600; margin-top: 14px; }
    input, textarea { width: 100%; font-size: 16px; padding: 10px; margin-top: 6px; box-sizing: border-box; }
    textarea { min-height: 90px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row > div { flex: 1 1 240px; }
    button { font-size: 16px; padding: 12px 14px; margin-top: 14px; width: 100%; }
    .small { font-size: 13px; opacity: 0.8; margin-top: 6px; }
    pre { white-space: pre-wrap; word-wrap: break-word; background: #f6f6f6; padding: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>PM Note Tool (v1)</h2>
    <div class="small">Tip: tap any field and use your iPhone keyboard mic for speech-to-text.</div>

    <label>Location</label>
    <input id="location" placeholder="Take 5 – Brown Deer Rd – Milwaukee" />

    <div class="row">
      <div>
        <label>Date</label>
        <input id="date" />
      </div>
      <div>
        <label>Work done (default)</label>
        <input id="workdone" />
      </div>
    </div>

    <label>Equipment on Site</label>
    <div class="small">Use codes like: RTU1, F1, RH1, RH2, MUA1, EF1 (we’ll expand them automatically).</div>
    <textarea id="equipment" placeholder="Example: RTU1, F1, RH1, RH2, MUA1, EF1"></textarea>

    <label>Parts used (filters / belts / etc.)</label>
    <input id="used" placeholder="Example: 1 – 16x25x1 pleated filter; 1 – BX35 belt" />

    <label>Cost of parts (if known)</label>
    <input id="partscost" placeholder="Example: $38.50 (or leave blank)" />

    <label>Parts needed for next PM</label>
    <input id="next" placeholder="Example: 1 – 16x25x1 pleated filter; 1 – BX35 belt" />

    <label>Notes</label>
    <textarea id="notes" placeholder="Example: All equipment operating normally at time of inspection."></textarea>

    <label>Recommended repairs (equipment-specific)</label>
    <textarea id="repairs" placeholder="Example: RTU1 needs BX35 belt, induced draft motor, condenser fan motor/blade/capacitor."></textarea>

    <button id="generate">Generate PM Report</button>
    <button id="copy">Copy Report</button>
    <button id="clear">Clear Form</button>

    <label>Output</label>
    <pre id="output">(Report will appear here)</pre>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function pad2(n) { return String(n).padStart(2, "0"); }
    function defaultDate() {
      const d = new Date();
      return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    }

    // Equipment shorthand map (prefix -> label)
    const EQUIP_MAP = new Map([
      ["RTU", "Rooftop Unit"],
      ["F", "Furnace"],
      ["RH", "Radiant Heater"],
      ["UH", "Unit Heater"],
      ["MUA", "Make-Up Air Unit"],
      ["MAU", "Make-Up Air Unit"], // alias, just in case
      ["EF", "Exhaust Fan"],
      ["AHU", "Air Handling Unit"],
      ["AC", "Condensing Unit"],
      ["HP", "Heat Pump"],
      ["ERV", "ERV"],
      ["HRV", "HRV"],
      ["DOAS", "DOAS"],
      ["FCU", "Fan Coil Unit"],
      ["VAV", "VAV Box"],
      ["B", "Boiler"],
      ["HWP", "Hot Water Pump"],
    ]);

    function expandEquipmentToken(token) {
      // Accept things like RTU1, RTU-1, RTU 1
      const t = token.trim();
      if (!t) return "";

      // Normalize: remove spaces, keep hyphen optional
      const compact = t.replace(/\s+/g, "");
      const m = compact.match(/^([A-Za-z]+)-?(\d+)$/);
      if (!m) return t; // keep original if it doesn't match pattern

      const prefix = m[1].toUpperCase();
      const num = m[2];
      const label = EQUIP_MAP.get(prefix);

      if (!label) return `${prefix}${num}`;
      return `${prefix}${num} (${label})`;
    }

    function expandEquipmentList(raw) {
      const text = (raw || "").trim();
      if (!text) return "Not listed";

      // Split on commas, semicolons, or newlines; then split remaining chunks by spaces if needed
      const chunks = text
        .split(/[\n,;]+/)
        .map(s => s.trim())
        .filter(Boolean);

      const tokens = [];
      for (const c of chunks) {
        // If they dictated "RTU1 RH1 RH2" in one chunk, split by spaces
        const parts = c.split(/\s+/).filter(Boolean);
        if (parts.length <= 1) tokens.push(c);
        else parts.forEach(p => tokens.push(p));
      }

      const expanded = tokens
        .map(expandEquipmentToken)
        .filter(Boolean);

      // Render one per line (clean for copy/paste)
      return expanded.join("\n");
    }

    function loadDraft() {
      const raw = localStorage.getItem("pm_note_tool_draft_v1");
      if (!raw) return;
      try {
        const d = JSON.parse(raw);
        $("location").value = d.location || "";
        $("date").value = d.date || defaultDate();
        $("workdone").value = d.workdone || $("workdone").value;
        $("equipment").value = d.equipment || "";
        $("used").value = d.used || "";
        $("partscost").value = d.partscost || "";
        $("next").value = d.next || "";
        $("notes").value = d.notes || "";
        $("repairs").value = d.repairs || "";
        $("output").textContent = d.output || $("output").textContent;
      } catch {}
    }

    function saveDraft() {
      const payload = {
        location: $("location").value.trim(),
        date: $("date").value.trim(),
        workdone: $("workdone").value.trim(),
        equipment: $("equipment").value.trim(),
        used: $("used").value.trim(),
        partscost: $("partscost").value.trim(),
        next: $("next").value.trim(),
        notes: $("notes").value.trim(),
        repairs: $("repairs").value.trim(),
        output: $("output").textContent
      };
      localStorage.setItem("pm_note_tool_draft_v1", JSON.stringify(payload));
    }

    function generateReport() {
      const location = $("location").value.trim() || "[Location]";
      const date = $("date").value.trim() || defaultDate();
      const workdone = $("workdone").value.trim() || "Changed filters/belts and verified operations of equipment";
      const equipmentRaw = $("equipment").value.trim();
      const equipmentExpanded = expandEquipmentList(equipmentRaw);

      const used = $("used").value.trim() || "None";
      const partscost = $("partscost").value.trim() || "Unknown";
      const next = $("next").value.trim() || "None";
      const notes = $("notes").value.trim() || "None";
      const repairs = $("repairs").value.trim();

      let report =
`PM

Location:
${location}

Date:
${date}

Equipment on Site:
${equipmentExpanded}

Note:
${notes}

Work done:
${workdone}

Parts used:
${used}

Cost of parts (if known):
${partscost}

Parts needed for next PM:
${next}
`;

      if (repairs) {
        report += `\nRecommended repairs:\n${repairs}\n`;
      } else {
        report += `\nRecommended repairs:\nNone\n`;
      }

      report += `\nPictures:\nNameplate photos attached.\n`;

      $("output").textContent = report;
      saveDraft();
    }

    async function copyReport() {
      const text = $("output").textContent;
      try {
        await navigator.clipboard.writeText(text);
        alert("Copied.");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        alert("Copied.");
      }
    }

    function clearForm() {
      if (!confirm("Clear this form?")) return;
      $("location").value = "";
      $("date").value = defaultDate();
      $("workdone").value = "Changed filters/belts and verified operations of equipment";
      $("equipment").value = "";
      $("used").value = "";
      $("partscost").value = "";
      $("next").value = "";
      $("notes").value = "";
      $("repairs").value = "";
      $("output").textContent = "(Report will appear here)";
      saveDraft();
    }

    // Init defaults
    $("date").value = defaultDate();
    $("workdone").value = "Changed filters/belts and verified operations of equipment";

    // Auto-save on input
    ["location","date","workdone","equipment","used","partscost","next","notes","repairs"].forEach(id => {
      $(id).addEventListener("input", saveDraft);
    });

    $("generate").addEventListener("click", generateReport);
    $("copy").addEventListener("click", copyReport);
    $("clear").addEventListener("click", clearForm);

    loadDraft();
  </script>
</body>
</html>
